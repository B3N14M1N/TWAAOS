<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestionar sarcini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg topbar py-3">
    <div class="container shell">
        <div class="d-flex align-items-center gap-2 text-white">
            <i class="bi bi-check2-square fs-5"></i>
            <div class="brand-font fw-bold fs-4">TaskFlow</div>
            <span class="badge rounded-pill text-bg-light text-dark">Lab 04</span>
        </div>
        <div id="user-controls" class="d-none align-items-center gap-3">
            <div class="text-white-50 small">Conectat ca</div>
            <div id="user-email" class="text-white fw-semibold"></div>
            <button id="btn-logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Deconectare
            </button>
        </div>
    </div>
</nav>

<main class="container shell py-4">
    <section id="auth-section" class="fade-in">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="panel p-4 p-md-5">
                    <h1 class="h3 brand-font mb-2">Bun venit</h1>
                    <p class="text-secondary mb-4">Autentificare rapidă pentru gestionarea sarcinilor tale.</p>

                    <div class="btn-group w-100 auth-segment mb-4" role="group" aria-label="Comutare formular">
                        <button type="button" id="tab-register" class="btn btn-success">Înregistrare</button>
                        <button type="button" id="tab-login" class="btn btn-outline-success">Autentificare</button>
                    </div>

                    <form id="register-form" novalidate>
                        <div class="mb-3">
                            <label for="register-email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="register-email" required autocomplete="email">
                        </div>
                        <div class="mb-3">
                            <label for="register-password" class="form-label">Parolă</label>
                            <input type="password" class="form-control" id="register-password" required minlength="6" autocomplete="new-password">
                        </div>
                        <div class="mb-3">
                            <label for="register-password-repeat" class="form-label">Confirmă parola</label>
                            <input type="password" class="form-control" id="register-password-repeat" required minlength="6" autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Creează cont</button>
                    </form>

                    <form id="login-form" class="d-none" novalidate>
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="login-email" required autocomplete="email">
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">Parolă</label>
                            <input type="password" class="form-control" id="login-password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Conectează-te</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section id="tasks-section" class="d-none fade-in">
        <div class="panel p-3 p-md-4 task-board-panel">
            <div class="d-flex flex-wrap align-items-center gap-2 justify-content-between mb-3">
                <h2 class="h4 mb-0">Sarcinile mele</h2>
                <div class="d-flex flex-wrap gap-2">
                    <span class="stats-chip" id="stat-total">Total: 0</span>
                    <span class="stats-chip" id="stat-open">În progres: 0</span>
                    <span class="stats-chip" id="stat-done">Finalizate: 0</span>
                </div>
            </div>
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div class="d-flex align-items-center gap-2">
                    <button id="btn-open-add-modal" class="btn btn-success rounded-pill px-3" type="button" data-bs-toggle="modal" data-bs-target="#addTaskModal" title="Adaugă sarcină">
                        <i class="bi bi-plus-lg me-1"></i>Task nou
                    </button>
                </div>
            </div>

            <div class="row g-3 align-items-end mb-3">
                <div class="col-12 col-lg-7">
                    <label for="search-input" class="form-label">Caută după titlu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input id="search-input" type="text" class="form-control" placeholder="Ex: raport, cumpărături...">
                    </div>
                </div>
                <div class="col-12 col-lg-5">
                    <label class="form-label">Filtru</label>
                    <div class="filter-pill">
                        <i class="bi bi-funnel"></i>
                        <span class="filter-text">Nefinalizate</span>
                        <input class="form-check-input" type="checkbox" id="filter-unfinished" aria-label="Nefinalizate">
                    </div>
                </div>
            </div>

            <div id="tasks-list" class="tasks-board"></div>
        </div>
    </section>
</main>

<div class="modal fade" id="addTaskModal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addTaskModalLabel">
                    <i class="bi bi-sticky me-2"></i>Task nou
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Închide"></button>
            </div>
            <div class="modal-body">
                <form id="create-task-form" class="d-flex flex-column gap-3">
                    <div>
                        <label for="new-title" class="form-label">Titlu</label>
                        <input type="text" id="new-title" class="form-control" placeholder="Titlu sarcină" maxlength="140" required>
                    </div>
                    <div>
                        <label for="new-description" class="form-label">Descriere</label>
                        <textarea id="new-description" class="form-control" placeholder="Descriere (opțional)" rows="4" maxlength="1000"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-success" data-bs-dismiss="modal">Anulează</button>
                <button type="submit" form="create-task-form" class="btn btn-success">
                    <i class="bi bi-plus-lg me-1"></i>Adaugă
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/app.js"></script>
</body>
</html>
